   function initializePathAnimation(selector) {
    const path = document.querySelector(selector);

    if (path) {
        // Berechne die Länge des Pfades

        // Setze die Dasharray und Dashoffset-Werte
        path.style.strokeDasharray = pathLength;

        // Keine Animation direkt starten, CSS übernimmt das Timing
    } else {
        console.error(`Pfad mit dem Selektor "${selector}" wurde nicht gefunden.`);
    }
}
